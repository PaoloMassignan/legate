name: Bug Report
description: Report a reproducible bug in Kiri
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        **Security vulnerability?** Use [Report a vulnerability](../security/advisories/new) — do NOT open a public issue.
  - type: input
    id: version
    attributes:
      label: Kiri version
      placeholder: "e.g. 0.1.0, or paste the commit hash"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Filter pipeline (L1 — regex)
        - Filter pipeline (L2 — symbol matching)
        - Filter pipeline (L3 — semantic / embedding)
        - Proxy / request routing
        - Indexer / embedder
        - CLI (kiri serve / add / rm / status)
        - Configuration / settings
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `kiri serve --config ...`
        2. Send request: ...
        3. Observe: ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Paste log output here. Redact any sensitive content before posting.
      render: text
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: Ubuntu 22.04
        Python: 3.11.9
        Install method: pip / git clone / other
